      # Additional medical details
      - diagnosis_confidence
      - surgery_required
      - surgery_type
      - recovery_timeline_days
      - total_medical_cost
      - disability_rating
      - return_to_work_prognosis
      - permanent_disability_expected
      - ongoing_treatment_required
      - treatment_plan_duration_days

