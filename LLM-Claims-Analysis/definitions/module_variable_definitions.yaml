      # Cost factors
      - treatment_complexity
      - ongoing_care_needs
      - rehabilitation_requirements
      - specialist_consultations_needed

    secondary_variables:
      # Clinical details (enrichment)
      - subjective_symptoms
      - objective_findings
      - pain_level_documented
      - functional_assessment
      - diagnostic_tests_ordered
      - therapy_prescribed

      # Work status tracking
      - work_status
      - work_restrictions
      - referrals_made
      - next_appointment

      # Treatment progression
      - treatment_response
      - improvement_noted
      - complications
      - patient_compliance
      - red_flags_medical
      - prognosis_updated
      - maximum_medical_improvement



# STAGE 1 VARIABLES - Document-Specific Extractions

stage1_variables:
  # TIER 1: COMPREHENSIVE DEFINITIONS (Critical Financial Variables)
  initial_reserve_amount:
    tier: 1
    description: "The first reserve amount set by the adjuster when the claim is opened, representing the initial estimate of total claim cost"
    data_type: "number"
    unit: "USD"
    applies_to_documents: ["adjuster_notes_initial"]
    extraction_rules:
      - "Extract ONLY from adjuster's reserve recommendation section"
      - "Must be an explicitly stated dollar amount, not calculated"
      - "Look for phrases: 'initial reserve', 'recommended reserve', 'total reserve'"
      - "This is the INITIAL estimate, not current or ultimate reserve"
      - "If medical and indemnity reserves are separate, sum them"
    calculation_method: "If itemized (medical + indemnity), sum the components"
    validation:
      min_value: 0
      max_value: 10000000
      rationale_required: true
      must_be_explicit: true
    examples:
      - scenario: "Direct statement"
        input: "Recommended Initial Reserve: $118,000"
        output: 118000
        rationale: "Extracted from Reserve Recommendations section where the total initial reserve is explicitly stated."
        rationale_type: "verbatim"
      - scenario: "Itemized reserves"
        input: "Medical Reserve: $78,000, Indemnity Reserve: $40,000"
        output: 118000
        rationale: "Sum of medical reserve ($78,000) and indemnity reserve ($40,000) from Reserve Recommendations."
        rationale_type: "derived"
      - scenario: "Wrong - using current reserve"
        input: "Current outstanding reserve: $45,000 (reduced from initial $118,000)"
        wrong_output: 45000
        correct_output: 118000
        why_wrong: "Used current reserve instead of initial reserve. Always use the first/initial amount."
    consistency_checks:
      - check: "initial_reserve_amount >= estimated_medical_cost + estimated_indemnity_cost"
        message: "Initial reserve should cover estimated components"
    related_variables: ["estimated_outstanding_cost", "recommended_reserve", "total_incurred_cost"]

  total_medical_cost:
    tier: 1
    description: "Total actual medical expenses incurred to date, including all medical treatment, diagnostic tests, procedures, and medications"
    data_type: "number"
    unit: "USD"
    applies_to_documents: ["settlement_adjuster_notes", "adjuster_notes_initial", "medical_provider_letter"]
    extraction_rules:
      - "Sum ALL medical expenses: hospital, surgery, pharmacy, therapy, diagnostics"
      - "Use ACTUAL incurred costs, not estimates or projections"
      - "If itemized, sum all components"
      - "Do NOT include future estimated costs"
      - "Do NOT include indemnity/wage replacement payments"
    validation:
      min_value: 0
      max_value: 5000000
      rationale_required: true
      must_match_itemization: true
    examples:
      - scenario: "Itemized medical costs"
        input: "Medical expenses: Hospital $12,450, Surgery $18,200, Physical therapy $4,800, Medications $1,550"
        output: 37000
        rationale: "Sum of itemized medical costs: Hospital ($12,450) + Surgery ($18,200) + PT ($4,800) + Meds ($1,550) = $37,000"
        rationale_type: "derived"
      - scenario: "Single total"
        input: "Total medical expenses paid to date: $22,375"
        output: 22375
        rationale: "Total medical expenses as stated in settlement notes"
        rationale_type: "verbatim"
      - scenario: "Wrong - including estimates"
        input: "Medical paid: $15,000. Estimated future treatment: $25,000"
        wrong_output: 40000
        correct_output: 15000
        why_wrong: "Should NOT include future estimated costs. Only actual incurred expenses."
    consistency_checks:
      - check: "total_medical_cost <= total_incurred_cost"
        message: "Medical costs cannot exceed total incurred"
      - check: "total_medical_cost >= 0"
        message: "Medical costs cannot be negative"
    related_variables: ["total_indemnity_paid", "total_incurred_cost", "estimated_outstanding_cost"]

  settlement_amount:
    tier: 1
    description: "The agreed-upon final settlement value for claim closure, representing the total amount the insurer will pay to resolve all claim obligations"
    data_type: "number"
    unit: "USD"
    applies_to_documents: ["settlement_adjuster_notes"]
    extraction_rules:
      - "Extract the FINAL agreed settlement figure"
      - "If range given (e.g., $65K-$75K), use the documented actual or conservative estimate"
      - "Must be explicitly stated in settlement section"
      - "This is the ULTIMATE cost for settling claims"
      - "Do NOT add speculative future costs beyond settlement"
    validation:
      min_value: 0
      max_value: 10000000
      rationale_required: true
      must_be_explicit: true
    examples:
      - scenario: "Direct settlement amount"
        input: "Settlement agreed at $65,000 to resolve all claim obligations"
        output: 65000
        rationale: "Final settlement amount as stated in settlement notes. This IS the ultimate claim cost."
        rationale_type: "verbatim"
      - scenario: "Settlement range"
        input: "Settlement value range: $65,000 - $75,000"
        output: 65000
        rationale: "Conservative estimate from settlement range ($65K-$75K). Using lower bound as documented amount."
        rationale_type: "derived"
      - scenario: "Wrong - adding speculation"
        input: "Settlement: $65,000. Potential future medical if claim reopens: $50,000"
        wrong_output: 115000
        correct_output: 65000
        why_wrong: "Do NOT add hypothetical future costs. Settlement amount IS the ultimate cost."
    critical_rule: "For settling claims: settlement_amount IS the ultimate_cost_prediction. Do not speculate beyond this."
    consistency_checks:
      - check: "settlement_amount >= total_incurred_cost"
        message: "Settlement typically >= incurred costs (covers all obligations)"
    related_variables: ["ultimate_cost_prediction", "ultimate_cost_category", "total_incurred_cost"]

  total_indemnity_paid:
    tier: 1
    description: "Total wage replacement and disability payments made to the claimant, separate from medical expenses"
    data_type: "number"
    unit: "USD"
    applies_to_documents: ["settlement_adjuster_notes", "adjuster_notes_initial"]
    extraction_rules:
      - "Extract wage replacement, temporary disability, permanent disability payments"
      - "Use ACTUAL paid amounts, not estimates"
      - "Do NOT include medical costs"
      - "Sum all indemnity payment types if itemized"
    validation:
      min_value: 0
      max_value: 5000000
      rationale_required: true
    examples:
      - scenario: "Single indemnity amount"
        input: "Total indemnity benefits paid: $18,500"
        output: 18500
        rationale: "Total indemnity payments as stated"
        rationale_type: "verbatim"
      - scenario: "Itemized indemnity"
        input: "Temporary disability: $12,000, Permanent disability: $8,000"
        output: 20000
        rationale: "Sum of TD ($12K) + PD ($8K) = $20,000"
        rationale_type: "derived"
    consistency_checks:
      - check: "total_indemnity_paid <= total_incurred_cost"
        message: "Indemnity cannot exceed total incurred"
    related_variables: ["total_medical_cost", "total_incurred_cost"]

  total_incurred_cost:
    tier: 1
    description: "Total costs incurred to date, including all medical and indemnity payments. This is actual spend, not estimates."
    data_type: "number"
    unit: "USD"
    applies_to_documents: ["settlement_adjuster_notes", "adjuster_notes_initial"]
    extraction_rules:
      - "Sum of total_medical_cost + total_indemnity_paid + other costs"
      - "Use ACTUAL incurred amounts only"
      - "Do NOT include future estimated costs"
      - "This represents money already spent"
    calculation_method: "total_medical_cost + total_indemnity_paid + administrative_costs"
    validation:
      min_value: 0
      max_value: 10000000
      rationale_required: true
      min_confidence: 0.7
    examples:
      - scenario: "Direct incurred statement"
        input: "Total incurred to date: $41,372"
        output: 41372
        rationale: "Total incurred costs as stated in settlement notes"
        rationale_type: "verbatim"
      - scenario: "Calculated from components"
        input: "Medical: $28,000, Indemnity: $12,000, Legal: $1,372"
        output: 41372
        rationale: "Sum of medical ($28K) + indemnity ($12K) + legal ($1,372) = $41,372"
        rationale_type: "derived"
    consistency_checks:
      - check: "total_incurred_cost = total_medical_cost + total_indemnity_paid"
        message: "Total incurred should equal sum of components"
      - check: "total_incurred_cost <= ultimate_cost_prediction"
        message: "Incurred cannot exceed ultimate prediction"
    related_variables: ["total_medical_cost", "total_indemnity_paid", "ultimate_cost_prediction"]

  estimated_outstanding_cost:
    tier: 1
    description: "Estimated remaining costs to close the claim, beyond what has already been incurred"
    data_type: "number"
    unit: "USD"
    applies_to_documents: ["adjuster_notes_initial", "settlement_adjuster_notes"]
    extraction_rules:
      - "Extract adjuster's estimate of FUTURE costs"
      - "Do NOT include already incurred costs"
      - "Look for: 'outstanding', 'future costs', 'remaining exposure'"
      - "This is in addition to total_incurred_cost"
    validation:
      min_value: 0
      max_value: 5000000
      rationale_required: true
    examples:
      - scenario: "Direct outstanding estimate"
        input: "Estimated outstanding costs: $35,000"
        output: 35000
        rationale: "Outstanding cost estimate per adjuster notes"
        rationale_type: "verbatim"
    consistency_checks:
      - check: "total_incurred_cost + estimated_outstanding_cost = ultimate_cost_prediction"
        message: "Incurred + outstanding should equal ultimate"
    related_variables: ["total_incurred_cost", "ultimate_cost_prediction"]

  recommended_reserve:
    tier: 1
    description: "Current recommended reserve amount based on latest claim development"
    data_type: "number"
    unit: "USD"
    applies_to_documents: ["adjuster_notes_initial", "settlement_adjuster_notes"]
    extraction_rules:
      - "Extract adjuster's recommended reserve amount"
      - "May differ from initial_reserve_amount as claim develops"
      - "Look for 'recommended reserve', 'revised reserve'"
    validation:
      min_value: 0
      max_value: 10000000
      rationale_required: true
    examples:
      - scenario: "Reserve recommendation"
        input: "Recommended reserve adjustment: $85,000"
        output: 85000
        rationale: "Current recommended reserve per adjuster"
        rationale_type: "verbatim"
    related_variables: ["initial_reserve_amount", "total_incurred_cost"]

  surgery_required:
    tier: 2
    description: "Whether the injury requires surgical intervention"
    data_type: "boolean"
    applies_to_documents: ["medical_provider_letter", "adjuster_notes_initial"]
    extraction_rules:
      - "True if surgery is performed or explicitly recommended"
      - "False if conservative treatment only"
      - "Look for: surgical procedure, operation, requires surgery"
    validation:
      rationale_required: true
    examples:
      - scenario: "Surgery mentioned"
        input: "Patient requires arthroscopic knee surgery"
        output: true
        rationale: "Surgical intervention explicitly required"
      - scenario: "Conservative treatment"
        input: "Will treat conservatively with physical therapy"
        output: false
        rationale: "No surgical intervention needed"
    related_variables: ["treatment_complexity", "total_medical_cost"]

  claim_severity:
    tier: 2
    description: "Overall claim severity assessment combining injury severity, treatment complexity, and financial impact"
    data_type: "string"
    valid_values: ["minor", "moderate", "major", "catastrophic"]
    applies_to_documents: ["all"]
    extraction_rules:
      - "Synthesize from injury severity, costs, treatment needs"
      - "minor: <$10K, simple treatment, quick recovery"
      - "moderate: $10K-$50K, standard treatment, normal recovery"
      - "major: $50K-$150K, complex treatment, extended recovery"
      - "catastrophic: >$150K, intensive treatment, permanent disability"
    validation:
      rationale_required: true
    examples:
      - scenario: "Major claim"
        input: "Complex knee surgery, 6 months recovery, $85K costs"
        output: "major"
        rationale: "High cost ($85K), surgical intervention, extended recovery"
    related_variables: ["injury_severity", "ultimate_cost_category"]

  disability_rating:
    tier: 2
    description: "Permanent disability rating as percentage of whole person impairment"
    data_type: "number"
    unit: "percentage"
    applies_to_documents: ["medical_provider_letter", "settlement_adjuster_notes"]
    extraction_rules:
      - "Extract formal disability rating if provided"
      - "Must be stated by medical provider"
      - "Range: 0-100%"
    validation:
      min_value: 0
      max_value: 100
      rationale_required: true
    examples:
      - scenario: "Disability rating"
        input: "15% permanent partial disability rating"
        output: 15
        rationale: "PPD rating per medical evaluation"
    related_variables: ["injury_severity", "return_to_work_prognosis"]

  litigation_risk:
    tier: 2
    description: "Risk that claim will result in litigation"
    data_type: "string"
    valid_values: ["low", "medium", "high"]
    applies_to_documents: ["adjuster_notes_initial", "settlement_adjuster_notes"]
    extraction_rules:
      - "Low: cooperative claimant, clear liability, standard treatment"
      - "Medium: some disputes, attorney involved, complex issues"
      - "High: attorney demanding, disputed liability, prior litigation"
    validation:
      rationale_required: true
    examples:
      - scenario: "Low litigation risk"
        input: "Claimant cooperative, no attorney, clear work-related injury"
        output: "low"
        rationale: "Cooperative claimant without legal representation"
      - scenario: "High litigation risk"
        input: "Attorney has filed demand letter, disputing causation"
        output: "high"
        rationale: "Attorney involvement with causation dispute"
    related_variables: ["fraud_risk", "settlement_likelihood"]

  fraud_risk:
    tier: 2
    description: "Assessment of potential fraud or malingering indicators"
    data_type: "string"
    valid_values: ["low", "medium", "high"]
    applies_to_documents: ["adjuster_notes_initial", "claimant_statement"]
    extraction_rules:
      - "Low: consistent story, objective findings match complaints"
      - "Medium: minor inconsistencies, subjective complaints exceed findings"
      - "High: major inconsistencies, surveillance concerns, conflicting statements"
    validation:
      rationale_required: true
    examples:
      - scenario: "Low fraud risk"
        input: "Story consistent across all documents, objective medical findings support injury"
        output: "low"
        rationale: "Consistent narrative with medical corroboration"
    related_variables: ["credibility_assessment", "litigation_risk"]

  injury_severity:
    tier: 2
    description: "Clinical severity of the injury based on medical assessment"
    data_type: "string"
    valid_values: ["minor", "moderate", "major", "catastrophic"]
    applies_to_documents: ["medical_provider_letter", "phone_transcript", "adjuster_notes_initial"]
    extraction_rules:
      - "Based on medical diagnosis and treatment needs"
      - "Minor: strains, sprains, no surgery"
      - "Moderate: fractures, standard surgery, recovery <6 months"
      - "Major: complex injuries, multiple surgeries, recovery >6 months"
      - "Catastrophic: permanent disability, ongoing care needs"
    validation:
      rationale_required: true
    examples:
      - scenario: "Major injury"
        input: "Compound femur fracture requiring ORIF surgery, 8 months recovery"
        output: "major"
        rationale: "Complex fracture requiring surgery with extended recovery"
    related_variables: ["claim_severity", "treatment_complexity"]

  return_to_work_prognosis:
    tier: 2
    description: "Expected timeline and likelihood of claimant returning to work"
    data_type: "string"
    valid_values: ["full_duty_soon", "modified_duty", "delayed_return", "unlikely_return", "permanent_disability"]
    applies_to_documents: ["medical_provider_letter", "adjuster_notes_initial"]
    extraction_rules:
      - "Based on medical provider's assessment"
      - "full_duty_soon: <30 days full return"
      - "modified_duty: can work with restrictions"
      - "delayed_return: >3 months to full duty"
      - "unlikely_return: poor prognosis for return"
      - "permanent_disability: will not return to work"
    validation:
      rationale_required: true
    examples:
      - scenario: "Modified duty"
        input: "Can return to modified duty with 20 lb lifting restriction"
        output: "modified_duty"
        rationale: "Able to work with restrictions per medical provider"
    related_variables: ["disability_rating", "injury_severity"]

  treatment_complexity:
    tier: 2
    description: "Complexity level of required medical treatment"
    data_type: "string"
    valid_values: ["conservative", "standard_surgical", "complex_surgical", "intensive_ongoing"]
    applies_to_documents: ["medical_provider_letter", "adjuster_notes_initial"]
    extraction_rules:
      - "conservative: PT, medications only"
      - "standard_surgical: routine surgery, standard recovery"
      - "complex_surgical: multiple procedures, specialist care"
      - "intensive_ongoing: chronic management, permanent care needs"
    validation:
      rationale_required: true
    examples:
      - scenario: "Complex surgical"
        input: "Requires spinal fusion followed by extensive rehabilitation"
        output: "complex_surgical"
        rationale: "Major surgery with extended rehabilitation needs"
    related_variables: ["surgery_required", "total_medical_cost"]

  settlement_likelihood:
    tier: 2
    description: "Probability that claim will settle vs. going to trial"
    data_type: "string"
    valid_values: ["high", "medium", "low"]
    applies_to_documents: ["settlement_adjuster_notes", "adjuster_notes_initial"]
    extraction_rules:
      - "High: parties close on value, cooperative negotiations"
      - "Medium: some gaps in positions, ongoing negotiations"
      - "Low: far apart on value, litigation likely"
    validation:
      rationale_required: true
    examples:
      - scenario: "High settlement likelihood"
        input: "Parties are $10K apart, both willing to negotiate"
        output: "high"
        rationale: "Small gap in positions with willingness to settle"
    related_variables: ["litigation_risk", "settlement_amount"]

  primary_diagnosis:
    tier: 2
    description: "Primary medical diagnosis code or description"
    data_type: "string"
    applies_to_documents: ["medical_provider_letter"]
    extraction_rules:
      - "Extract primary diagnosis as stated by medical provider"
      - "Include ICD code if available"
    validation:
      rationale_required: false
    examples:
      - scenario: "Diagnosis stated"
        input: "Primary diagnosis: L4-L5 lumbar disc herniation"
        output: "L4-L5 lumbar disc herniation"

  body_parts_affected:
    tier: 2
    description: "List of body parts injured or affected"
    data_type: "array"
    applies_to_documents: ["all"]
    extraction_rules:
      - "List all injured body parts"
      - "Use standardized anatomical terms"
    validation:
      rationale_required: false
    examples:
      - scenario: "Multiple body parts"
        input: "Injured right knee and lower back"
        output: ["right_knee", "lower_back"]

  credibility_assessment:
    tier: 2
    description: "Assessment of claimant credibility and consistency"
    data_type: "string"
    valid_values: ["high", "medium", "low"]
    applies_to_documents: ["claimant_statement", "phone_transcript", "adjuster_notes_initial"]
    extraction_rules:
      - "High: consistent story, corroborated by evidence"
      - "Medium: minor inconsistencies"
      - "Low: major contradictions or concerns"
    validation:
      rationale_required: true
    examples:
      - scenario: "High credibility"
        input: "Claimant story consistent across all interviews, supported by witness"
        output: "high"
        rationale: "Consistent narrative with corroboration"


  # TIER 3: MINIMAL DEFINITIONS (Administrative, Dates, IDs)


  claim_number:
    tier: 3
    description: "Unique claim identifier"
    data_type: "string"
    applies_to_documents: ["all"]
    extraction_rules:
      - "Extract exact claim number as stated"
    validation:
      format: "alphanumeric with hyphens"
      rationale_required: false
    examples:
      - scenario: "Claim number"
        input: "Claim #: 2024-MC-087432"
        output: "2024-MC-087432"

  date_of_loss:
    tier: 3
    description: "Date injury occurred"
    data_type: "date"
    format: "YYYY-MM-DD"
    applies_to_documents: ["all"]
    extraction_rules:
      - "Extract date incident happened"
      - "Convert to YYYY-MM-DD format"
    validation:
      must_be_past_date: true
      rationale_required: false
    examples:
      - scenario: "Date stated"
        input: "Injury occurred on March 14, 2024"
        output: "2024-03-14"

  claim_closure_status:
    tier: 3
    description: "Current status of claim"
    data_type: "string"
    valid_values: ["open", "closed_settled", "closed_denied", "pending_settlement"]
    applies_to_documents: ["settlement_adjuster_notes", "adjuster_notes_initial"]
    extraction_rules:
      - "Extract current claim status"
    validation:
      rationale_required: false
    examples:
      - scenario: "Status stated"
        input: "Claim is settling this week"
        output: "pending_settlement"

  # Additional Tier 3 variables (30+ more following similar minimal pattern)
  incident_type:
    tier: 3
    description: "Type of incident causing injury"
    data_type: "string"
    applies_to_documents: ["all"]
    extraction_rules: ["Extract incident type: fall, struck_by, caught_in, etc."]
    validation: {rationale_required: false}

  employer_name:
    tier: 3
    description: "Name of employer"
    data_type: "string"
    applies_to_documents: ["phone_transcript", "adjuster_notes_initial"]
    extraction_rules: ["Extract employer name"]
    validation: {rationale_required: false}

  claimant_age:
    tier: 3
    description: "Age of claimant"
    data_type: "number"
    applies_to_documents: ["all"]
    extraction_rules: ["Extract age if stated"]
    validation: {min_value: 16, max_value: 100, rationale_required: false}

  # [... Continue with remaining 25+ Tier 3 variables following same minimal pattern]


# =============================================================================
# STAGE 2 VARIABLES - Actuarial Analysis Output
# =============================================================================
# Variables are organized by actuarial function category:
# 1. RESERVING: Variables for reserve setting and cost prediction
# 2. RATEMAKING: Variables for pricing and risk classification
# 3. CLAIM_MANAGEMENT: Variables for claim handling and operations
# =============================================================================

stage2_variables:

  # ===========================================================================
  # RESERVING VARIABLES
  # Purpose: Reserve setting, cost prediction, and loss development
  # Used for: IBNR estimates, reserve triangles, adequacy testing
  # ===========================================================================

  claim_severity:
    category: "RESERVING"
    description: "Overall claim severity classification combining injury severity, treatment complexity, and financial impact from all source documents"
    data_type: "string"
    enum: [ "minor", "moderate", "major", "catastrophic" ]

    feature_importance:
      # Settlement adjuster - Final assessment with complete claim history (highest authority)
      settlement_adjuster_notes.claim_severity: 0.98
      settlement_adjuster_notes.settlement_amount: 0.95
      settlement_adjuster_notes.total_incurred_cost: 0.93
      settlement_adjuster_notes.medical_complications: 0.90
      settlement_adjuster_notes.permanent_disability_final: 0.88

      # Medical provider - Professional clinical severity assessment
      medical_provider_letter.injury_severity: 0.95
      medical_provider_letter.disability_rating: 0.92
      medical_provider_letter.treatment_complexity: 0.90
      medical_provider_letter.severity_assessment: 0.88
      medical_provider_letter.permanent_impairment_likelihood: 0.85
      medical_provider_letter.work_restrictions_severity: 0.83

      # Clinical notes - Ongoing clinical assessment
      clinical_note.severity_assessment: 0.85
      clinical_note.complications_risk: 0.82
      clinical_note.functional_limitations: 0.80
      clinical_note.treatment_response: 0.78

      # Initial adjuster - Early professional assessment
      adjuster_notes_initial.claim_severity: 0.70
      adjuster_notes_initial.injury_severity: 0.68
      adjuster_notes_initial.initial_reserve_amount: 0.65
      adjuster_notes_initial.investigation_complexity: 0.60

      # Phone transcript - Initial report severity indicators
      phone_transcript.injury_severity_initial: 0.45
      phone_transcript.emergency_care_required: 0.42
      phone_transcript.injury_type_and_body_part: 0.40

      # Claimant statement - Self-reported severity (lowest authority)
      claimant_statement.injury_description: 0.35
      claimant_statement.pain_level_claimed: 0.30

    aggregation_rules:
      priority_logic: |
        1. Prioritize settlement adjuster's final assessment (complete claim knowledge)
        2. Cross-validate with medical provider's clinical severity assessment
        3. Consider actual costs and medical complications as validators
        4. Severity Thresholds:
           - minor: <$10K total costs, simple treatment, quick recovery (<30 days)
           - moderate: $10K-$50K costs, standard treatment, normal recovery (30-180 days)
           - major: $50K-$150K costs, complex treatment, extended recovery (180-365 days)
           - catastrophic: >$150K costs, intensive/ongoing treatment, permanent disability (>365 days)
        5. If conflicting assessments:
           - Use highest severity supported by medical evidence
           - Settlement costs and medical complications override initial estimates
           - Permanent disability indicators escalate severity to major or catastrophic
        6. Validate against ultimate_cost_prediction for consistency

        Conflict_resolution: When Stage 1 sources disagree:
        - Settlement adjuster assessment takes precedence over all others
        - Medical provider assessment overrides non-clinical assessments
        - Actual costs and outcomes override estimates
        - If medical says "major" but costs <$10K → Use clinical assessment (potential development)
        - If costs >$150K but medical says "moderate" → Use costs (financial severity)

    validation:
      min_confidence: 0.75
      rationale_required: true

    consistency_checks:
      - check: "claim_severity aligns with injury_severity"
        message: "Claim severity should generally match or exceed injury severity"
      - check: "claim_severity consistent with ultimate_cost_prediction"
        message: "High-cost claims should not be classified as minor severity"
      - check: "catastrophic severity requires permanent_disability or costs >$150K"
        message: "Catastrophic classification requires strong supporting evidence"

    examples:
      - scenario: "Minor claim with consistent assessments"
        stage1_data:
          adjuster_notes_initial.claim_severity: "minor"
          medical_provider_letter.injury_severity: "minor"
          settlement_adjuster_notes.total_incurred_cost: 8500
        output: "minor"
        rationale: "All sources consistently indicate minor severity with costs <$10K and simple treatment"

      - scenario: "Major claim with medical complexity"
        stage1_data:
          medical_provider_letter.injury_severity: "major"
          settlement_adjuster_notes.medical_complications: "significant"
          settlement_adjuster_notes.total_incurred_cost: 118000
        output: "major"
        rationale: "Medical assessment indicates major injury with complications, supported by costs of $118K in the major range ($50K-$150K)"

      - scenario: "Catastrophic claim with permanent disability"
        stage1_data:
          medical_provider_letter.permanent_impairment_likelihood: "highly_likely"
          settlement_adjuster_notes.permanent_disability_final: "25%"
          settlement_adjuster_notes.settlement_amount: 275000
        output: "catastrophic"
        rationale: "Permanent disability of 25% and settlement of $275K clearly indicate catastrophic severity"

      - scenario: "Conflict resolution - escalating severity based on costs"
        stage1_data:
          adjuster_notes_initial.claim_severity: "moderate"
          medical_provider_letter.injury_severity: "moderate"
          settlement_adjuster_notes.total_incurred_cost: 165000
          settlement_adjuster_notes.medical_complications: "unexpected surgical intervention"
        output: "major"
        rationale: "Initial assessments indicated moderate severity, but actual costs of $165K and unexpected complications escalate final classification to major"

    related_variables:
      - "injury_severity"
      - "medical_complexity"
      - "ultimate_cost_prediction"
      - "ultimate_cost_category"
      - "treatment_type"
      - "expected_development_pattern"
      - "permanent_disability_rating"

  ultimate_cost_prediction:
    category: "RESERVING"
    description: "Final predicted total claim cost including all medical, indemnity, and administrative expenses"
    data_type: "number"
    unit: "USD"

    feature_importance:
      # Settlement documents - ACTUAL final values (highest authority)
      settlement_adjuster_notes.settlement_amount: 1.0
      settlement_adjuster_notes.total_incurred_cost: 1.0
      settlement_adjuster_notes.total_medical_costs: 0.98
      settlement_adjuster_notes.total_wage_loss: 0.98

      # Medical provider - Expert clinical cost assessment
      medical_provider_letter.total_medical_cost: 0.90
      medical_provider_letter.treatment_complexity: 0.88
      medical_provider_letter.treatment_duration_estimates: 0.87
      medical_provider_letter.specialist_care_requirements: 0.86
      medical_provider_letter.future_medical_necessity: 0.85
      medical_provider_letter.surgery_required: 0.85

      # Clinical notes - Treatment progression and complexity
      clinical_note.treatment_complexity: 0.80
      clinical_note.ongoing_care_needs: 0.78
      clinical_note.specialist_consultations_needed: 0.77
      clinical_note.rehabilitation_requirements: 0.76

      # Settlement analysis - Cost development patterns
      settlement_adjuster_notes.cost_development_vs_reserves: 0.75
      settlement_adjuster_notes.medical_complications: 0.73

      # Initial adjuster - Early reserve estimates
      adjuster_notes_initial.initial_reserve_amount: 0.55
      adjuster_notes_initial.medical_reserve_amount: 0.53
      adjuster_notes_initial.indemnity_reserve_amount: 0.52

      # Phone transcript - Very early cost indicators
      phone_transcript.hospital_er_treatment: 0.40
      phone_transcript.specialist_referral: 0.38
      phone_transcript.surgery_potential: 0.37
    aggregation_rules:
      priority_logic: |
        1. If claim settling/closed → Use settlement_amount (IS the ultimate cost)
        2. If settlement_value_range exists → Use midpoint or conservative estimate
        3. If claim open → Use total_incurred_cost + estimated_outstanding_cost
        4. Fallback → Use initial_reserve_amount
        CRITICAL: If settlement_amount exists → ultimate_cost MUST equal settlement_amount
        CRITICAL: Settlement or closed value IS the final cost - do not add speculation or future costs
        Otherwise → Use weighted average based on feature_importance weights
    validation:
      min_value: 0
      max_value: 10000000
      min_confidence: 0.6
      rationale_required: true
    examples:
      - scenario: "Settling claim"
        stage1_data:
          total_incurred_cost: 41372
          settlement_amount: 65000
          claim_closure_status: "pending_settlement"
        correct_output: 65000
        correct_category: "50K-100K"
        rationale: "Claim settling at $65,000 per settlement notes. This IS the ultimate cost."
        rationale_type: "conflict_resolved"
        wrong_output: 150000
        why_wrong: "Cannot exceed settlement amount with speculation. Settlement IS ultimate cost."
      - scenario: "Open claim"
        stage1_data:
          total_incurred_cost: 28000
          estimated_outstanding_cost: 22000
          claim_closure_status: "open"
        correct_output: 50000
        correct_category: "25K-50K"
        rationale: "Open claim: Incurred $28K + Outstanding $22K = $50K ultimate"
    decision_matrix:
      settling_claim:
        condition: "claim_closure_status == 'pending_settlement'"
        action: "Use settlement_amount"
        do_not: "Add any additional costs or speculation"
      open_claim:
        condition: "claim_closure_status == 'open'"
        action: "Sum incurred + outstanding"
        do_not: "Speculate beyond documented estimates"
    consistency_checks:
      - check: "ultimate_cost_prediction >= total_incurred_cost"
        message: "Ultimate cost cannot be less than already incurred costs"
      - check: "ultimate_cost_prediction matches ultimate_cost_category range"
        message: "Prediction must fall within category range"
      - check: "If settlement_amount exists, ultimate_cost_prediction == settlement_amount"
        message: "For settling claims, ultimate MUST equal settlement"
    critical_rule: "When claim is settling: settlement_amount IS ultimate_cost_prediction. Do not add speculation or future costs beyond documented settlement."
    related_variables: ["total_incurred_cost", "estimated_outstanding_cost", "recommended_reserve", "ultimate_cost_category", "settlement_amount"]

  total_incurred_cost:
    category: "RESERVING"
    description: "Total costs paid and incurred to date - critical for reserve adequacy and ultimate cost prediction"
    data_type: "number"
    unit: "USD"

    feature_importance:
      # Settlement documents - ACTUAL final incurred (highest authority)
      settlement_adjuster_notes.total_incurred_cost: 1.0
      settlement_adjuster_notes.total_medical_costs: 0.98
      settlement_adjuster_notes.total_wage_loss: 0.98
      settlement_adjuster_notes.administrative_costs: 0.95

      # Medical provider - Medical cost component
      medical_provider_letter.total_medical_cost: 0.88

      # Initial adjuster - Early incurred tracking
      adjuster_notes_initial.initial_reserve_amount: 0.50

    aggregation_rules:
      priority_logic: |
        1. If total_incurred_cost exists → RETURN total_incurred_cost (IS actual incurred)
        2. If settlement closed → SUM available cost components (medical + wage_loss + admin)
        3. Otherwise → Use weighted average of cost indicators
        CRITICAL: If total_incurred_cost exists in settlement notes → MUST use exact value
        CRITICAL: Use only DOCUMENTED/PAID amounts, do NOT speculate
        CRITICAL: Priority: Settlement notes > Adjuster notes > Medical bills
        Formula when available: paid_medical + paid_indemnity + administrative_costs

    validation:
      min_value: 0
      max_value: 10000000
      min_confidence: 0.7
      rationale_required: true
    examples:
      - scenario: "Clear incurred costs from settlement notes"
        stage1_data:
          medical_paid: 35000
          indemnity_paid: 22000
          legal_fees: 8000
          case_management: 3000
        output: 68000
        rationale: "Total incurred: $35K medical + $22K indemnity + $8K legal + $3K case mgmt = $68K paid to date"
      - scenario: "Incurred costs must be less than ultimate"
        stage1_data:
          total_paid: 45000
          ultimate_prediction: 75000
        output: 45000
        rationale: "$45K incurred to date with $75K ultimate prediction indicates $30K outstanding reserve needed"
        wrong_output: 80000
        why_wrong: "Total incurred cannot exceed ultimate cost prediction. If incurred > ultimate, ultimate needs correction."
    consistency_checks:
      - check: "total_incurred_cost <= ultimate_cost_prediction"
        message: "Incurred costs cannot exceed ultimate prediction"
      - check: "For closed/settled claims: total_incurred_cost should be close to ultimate_cost_prediction"
    critical_rule: "MATHEMATICAL VALIDATION: total_incurred + estimated_outstanding ≈ ultimate_cost_prediction"
    related_variables: ["ultimate_cost_prediction", "estimated_outstanding_cost", "recommended_reserve", "settlement_amount"]

  estimated_outstanding_cost:
    category: "RESERVING"
    description: "Estimated future costs to be incurred from current date until claim closure"
    data_type: "number"
    unit: "USD"

    feature_importance:
      # Medical provider - Future treatment needs (highest authority)
      medical_provider_letter.future_medical_necessity: 1.0
      medical_provider_letter.treatment_duration_estimates: 0.90
      medical_provider_letter.therapy_rehabilitation_needs: 0.88
      medical_provider_letter.ongoing_treatment_costs: 0.95
      medical_provider_letter.expected_recovery_time: 0.90
      medical_provider_letter.treatment_complexity: 0.88
      medical_provider_letter.specialist_care_requirements: 0.85
      medical_provider_letter.ongoing_treatment_required: 0.85
      # Clinical notes - Ongoing care assessment
      clinical_note.ongoing_care_needs: 0.83
      clinical_note.rehabilitation_requirements: 0.80
      clinical_note.specialist_consultations_needed: 0.80
      clinical_note.expected_recovery_time: 0.78

      # Settlement adjuster - Development pattern insights
      settlement_adjuster_notes.cost_development_vs_reserves: 0.75
      settlement_adjuster_notes.reserve_adequacy: 0.73

      # Initial adjuster - Early reserve gap estimates
      adjuster_notes_initial.reserve_adequacy_assessment: 0.65
      adjuster_notes_initial.initial_reserve_amount: 0.60
      adjuster_notes_initial.medical_reserve_amount: 0.55
      adjuster_notes_initial.estimated_outstanding_cost: 0.50

      # Phone transcript - Early absence indicators
      phone_transcript.work_absence_expected: 0.35
    aggregation_rules:
      priority_logic: |
        1. If claim is closed → outstanding_cost = 0
        2. Calculate: ultimate_cost_prediction - total_incurred_cost
        3. If settlement_amount and total_incurred_cost known → RETURN (settlement_amount - total_incurred_cost)
        4. Otherwise → Use weighted average of future medical assessments, expected future indemnity duration and amount, anticipated legal/settlement costs, case management and closure costs
           Use medical provider's future treatment cost estimates
           Adjust for development pattern from settlement adjuster
        CRITICAL: Closed claims have zero outstanding costs
    validation:
      min_value: 0
      max_value: 10000000
      min_confidence: 0.6
      rationale_required: true
    examples:
      - scenario: "Open claim with ongoing treatment"
        stage1_data:
          total_incurred: 40000
          projected_medical: 25000
          expected_indemnity: 30000
          legal_settlement: 10000
        output: 65000
        rationale: "Estimated outstanding: $25K projected medical + $30K expected indemnity + $10K legal costs = $65K reserve needed"
      - scenario: "Settling claim - minimal outstanding"
        stage1_data:
          settlement_amount: 75000
          total_incurred: 70000
          claim_status: "pending_settlement"
        output: 5000
        rationale: "Settlement at $75K with $70K incurred leaves only $5K outstanding to reach settlement"
      - scenario: "Closed claim - zero outstanding"
        stage1_data:
          settlement_amount: 85000
          total_incurred: 85000
          claim_status: "closed_settled"
        output: 0
        rationale: "Claim closed at settlement amount with all costs paid - no outstanding reserve"
    consistency_checks:
      - check: "estimated_outstanding_cost + total_incurred_cost ≈ ultimate_cost_prediction"
        message: "Outstanding + incurred should equal ultimate prediction"
      - check: "For closed claims: estimated_outstanding_cost should be 0 or very small"
    critical_rule: "SETTLEMENT RULE: If settling, outstanding = settlement_amount - total_incurred_cost"
    related_variables: ["ultimate_cost_prediction", "total_incurred_cost", "recommended_reserve", "settlement_amount"]

  recommended_reserve:
    category: "RESERVING"
    description: "Recommended case reserve amount based on all available information"
    data_type: "number"
    unit: "USD"

    feature_importance:
      # Settlement adjuster - Most current reserve recommendation
      settlement_adjuster_notes.total_incurred_cost: 0.95
      settlement_adjuster_notes.settlement_amount: 0.93
      settlement_adjuster_notes.recommended_reserve: 1.0
      settlement_adjuster_notes.reserve_adequacy: 0.90
      settlement_adjuster_notes.cost_development_vs_reserves: 0.87

      # Medical provider - Clinical cost assessment
      medical_provider_letter.total_medical_cost: 0.88
      medical_provider_letter.future_medical_necessity: 0.86
      medical_provider_letter.treatment_complexity: 0.84

      # Initial adjuster - Early reserve setting
      adjuster_notes_initial.recommended_reserve: 0.70
      adjuster_notes_initial.initial_reserve_amount: 0.68
      adjuster_notes_initial.indemnity_reserve_amount: 0.57
      adjuster_notes_initial.reserve_adequacy_assessment: 0.55

      # Phone transcript - Very early cost indicators
      phone_transcript.hospital_er_treatment: 0.38
      phone_transcript.specialist_referral: 0.36
    aggregation_rules:
      priority_logic: |
        1. If settlement exists → Use actual costs for reserve adequacy learning, reserve = settlement_amount - total_incurred_cost
        2. For open claims: reserve = estimated future medical + indemnity + legal + closing costs
        3. If reserve_adequacy = "inadequate" → Increase reserve by development factor
        4. Otherwise → Use ultimate_cost_prediction as recommended reserve
        5. Apply reserve adequacy factor based on historical patterns. Recommended reserve = estimated_outstanding_cost

    validation:
      min_value: 0
      max_value: 10000000
      min_confidence: 0.6
      rationale_required: true
    examples:
      - scenario: "Open claim reserve"
        stage1_data:
          total_incurred: 40000
          ultimate_prediction: 90000
          estimated_outstanding: 50000
        output: 50000
        rationale: "Reserve of $50K recommended to reach $90K ultimate from $40K current incurred"
      - scenario: "Settling claim minimal reserve"
        stage1_data:
          settlement_amount: 75000
          total_incurred: 72000
        output: 3000
        rationale: "Reserve of $3K needed to complete $75K settlement from $72K incurred"
    related_variables: ["estimated_outstanding_cost", "ultimate_cost_prediction", "total_incurred_cost"]

  injury_severity:
    category: "RESERVING"
    description: "Severity classification of the injury for actuarial reserving and loss development modeling"
    data_type: "string"
    enum: ["minor", "moderate", "major", "catastrophic"]

    feature_importance:
      # Medical provider - Professional medical assessment (highest authority)
      medical_provider_letter.injury_severity: 1.0
      medical_provider_letter.disability_rating: 0.95
      medical_provider_letter.primary_diagnosis: 0.90
      medical_provider_letter.treatment_complexity: 0.88
      medical_provider_letter.specific_diagnosis: 0.92
      medical_provider_letter.severity_assessment: 0.90
      medical_provider_letter.diagnostic_certainty: 0.88
      medical_provider_letter.complication_risk: 0.86
      medical_provider_letter.work_restrictions_severity: 0.85

      # Clinical notes - Clinical assessment
      clinical_note.severity_assessment: 0.90
      clinical_note.primary_diagnosis: 0.82
      clinical_note.complications_risk: 0.80
      clinical_note.clinical_findings: 0.85
      clinical_note.functional_limitations: 0.83

      # Settlement adjuster - Updated assessment with full claim history
      settlement_adjuster_notes.injury_severity: 0.80
      settlement_adjuster_notes.medical_complications: 0.75
      settlement_adjuster_notes.permanent_disability_final: 0.73

      # Initial adjuster - Professional claims assessment
      adjuster_notes_initial.injury_severity: 0.70
      adjuster_notes_initial.claim_severity: 0.68

      # Initial adjuster - Early severity estimate
      adjuster_notes_initial.investigation_complexity: 0.55

      # Phone transcript - Initial observation (lowest authority)
      phone_transcript.injury_severity_initial: 0.40
      phone_transcript.initial_pain_level: 0.35
      phone_transcript.injury_type_and_body_part: 0.40
      phone_transcript.emergency_care_required: 0.37
      phone_transcript.immediate_functional_limitations: 0.35

      # Claimant statement - Self-reported severity
      claimant_statement.injury_description: 0.35
      claimant_statement.pain_level_claimed: 0.33
    aggregation_rules:
      priority_logic: |
        1. Prioritize medical provider assessment (clinical expertise)
        2. If conflicting, use most severe supported by medical evidence
        3. Consider disability rating and treatment complexity as validators
        4. Settlement adjuster's assessment incorporates full claim development

        CRITICAL: Medical provider expert assessment takes precedence
    validation:
      min_confidence: 0.7
      rationale_required: true
    examples:
      - scenario: "Major injury"
        input: "Compound femur fracture requiring ORIF surgery, 8 months recovery"
        output: "major"
        rationale: "Complex fracture requiring surgery with extended recovery"
    related_variables: ["claim_severity", "treatment_complexity","medical_complexity", "ultimate_cost_prediction", "treatment_type"]

  medical_complexity:
    category: "RESERVING"
    description: "Complexity level of medical treatment and care management required"
    data_type: "string"
    enum: ["simple", "moderate", "complex", "highly_complex"]
    feature_importance:
      # Medical provider - Treatment planning authority
      medical_provider_letter.treatment_complexity: 1.0
      medical_provider_letter.surgery_required: 0.95
      medical_provider_letter.specialist_referrals: 0.9
      medical_provider_letter.specialist_care_requirements: 0.92
      medical_provider_letter.ongoing_treatment_required: 0.90
      medical_provider_letter.complication_risk: 0.88

      # Clinical notes - Treatment execution complexity
      clinical_note.treatment_complexity: 0.88
      clinical_note.procedures_performed: 0.85
      clinical_note.surgery_required: 0.85
      clinical_note.specialist_consultations_needed: 0.83
      clinical_note.rehabilitation_requirements: 0.80

      # Settlement adjuster - Realized complexity
      settlement_adjuster_notes.medical_complications: 0.78
      settlement_adjuster_notes.treatment_challenges: 0.75

      # Initial adjuster - Early complexity assessment
      adjuster_notes_initial.treatment_complexity_estimated: 0.60
      adjuster_notes_initial.medical_complexity: 0.7
      adjuster_notes_initial.treatment_complexity: 0.65

      # Settlement notes
      settlement_adjuster_notes.treatment_complexity: 0.75
    aggregation_rules:
      priority_logic: |
        1. Medical provider's treatment plan is authoritative
        2. Surgery required → minimum "moderate" complexity
        3. Multiple specialists involved → minimum "complex"
        4. Consider both planned complexity and realized complications
       
        NOTE: This is COMPLEXITY of treatment, not TYPE of treatment.
        Treatment TYPE (conservative/surgical) is a separate variable.
        Simple: Single body part, straightforward care, minimal interventions, <3 months recovery
          - Example: Ankle sprain with PT only
        Moderate: Multiple treatments, standard medical protocols, 3-6 months recovery
          - Example: Standard fracture with casting and follow-up
        Complex: Surgical intervention, multiple specialists, complications, 6-12 months recovery
          - Example: Back surgery with extended PT and pain management
        Highly_Complex: Multiple surgeries, chronic care, permanent disability, ongoing management
          - Example: Catastrophic injury requiring lifetime care

    validation:
      min_confidence: 0.7
      rationale_required: true
    examples:
      - scenario: "Conservative treatment BUT moderate complexity"
        stage1_data:
          treatment_type: "conservative"
          multiple_procedures: false
          specialists: [ "orthopedic", "physical_therapy" ]
          recovery_months: 4
        output: "moderate"
        rationale: "Even though treatment is conservative (no surgery), the case requires multiple specialists and 4-month recovery, indicating moderate medical complexity"
        wrong_output: "conservative"
        why_wrong: "'conservative' is a treatment TYPE, not a complexity level. Use 'simple' or 'moderate' for complexity."
      - scenario: "Complex surgical treatment"
        stage1_data:
          treatment_type: "surgical"
          surgery_required: true
          multiple_procedures: true
          recovery_months: 8
          specialists: [ "surgeon", "pain_management", "PT" ]
        output: "complex"
        rationale: "Multiple surgical procedures with 8-month recovery and multiple specialists indicates complex medical treatment"
      - scenario: "Simple conservative care"
        stage1_data:
          treatment_type: "conservative"
          pt_only: true
          recovery_months: 2
        output: "simple"
        rationale: "Physical therapy only with 2-month recovery is simple complexity, even though treatment type is conservative"
    consistency_checks:
      - check: "highly_complex → total_medical_cost typically >$75K"
      - check: "simple → total_medical_cost typically <$15K"
      - check: "Do NOT confuse with treatment_type - 'conservative' is NOT a valid medical_complexity value"
    critical_rule: "IMPORTANT: medical_complexity measures COMPLEXITY (simple/moderate/complex/highly_complex), NOT treatment TYPE (conservative/surgical). These are separate variables."
    related_variables: ["injury_severity"]

