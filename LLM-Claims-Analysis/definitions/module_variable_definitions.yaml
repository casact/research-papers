        rationale: "Small gap in positions with willingness from both sides to settle"
    related_variables: ["litigation_risk", "management_complexity", "ultimate_cost_prediction"]

  work_relatedness_status: # or coverage_determination
    category: "CLAIM_MANAGEMENT"
    description: "Official determination of whether injury is work-related and compensable under workers' compensation"
    data_type: "string"
    enum: [ "accepted", "disputed", "denied", "under_investigation" ]
    feature_importance:
        # Adjuster - Official liability/coverage determination
        adjuster_notes_initial.liability_determination: 0.85
        adjuster_notes_initial.coverage_issues: 0.82
        adjuster_notes_initial.investigation_complexity: 0.75

        # Settlement - Final outcome
        settlement_adjuster_notes.claim_closure_status: 0.95

        # Medical - Clinical causation support
        medical_provider_letter.diagnostic_certainty: 0.70
        medical_provider_letter.specific_diagnosis: 0.68

        # Investigation factors
        phone_transcript.mechanism_of_injury: 0.50
        phone_transcript.witness_availability: 0.48
        claimant_statement.fact_verification: 0.45
    aggregation_rules:
        priority_logic: |
          1. If claim_closure_status = "closed_denied" → RETURN "denied"
          2. If adjuster liability_determination exists → Use as primary
          3. If coverage_issues = "major" → Minimum "disputed"
          4. Otherwise → Infer from investigation findings
  
          CRITICAL: This determines if claim is compensable at all
    validation:
        rationale_required: true
        min_confidence: 0.8
        must_align_with_claim_status: true

    related_variables: [ "litigation_risk", "settlement_likelihood", "ultimate_cost_prediction" ]


  # ===========================================================================
  # ADDITIONAL VARIABLES (Future Implementation)
  # ===========================================================================
  # These variables are defined with basic structure but do NOT yet have
  # feature_importance mappings. LLM will use basic guidance and document
  # analysis until feature_importance is added in future phases.
  # ===========================================================================

  ultimate_cost_category:
    category: "RESERVING"
    description: "Categorical range of ultimate claim cost for loss development modeling"
    data_type: "string"
    enum: ["<25K", "25K-50K", "50K-100K", "100K-150K", ">150K"]
    aggregation_rules:
      logic: |
        CRITICAL: Category MUST match the ultimate_cost_prediction value
        
        Categorization rules (STRICT):
        - <25K: ultimate_cost_prediction < 25000
        - 25K-50K: 25000 <= ultimate_cost_prediction < 50000
        - 50K-100K: 50000 <= ultimate_cost_prediction < 100000
        - 100K-150K: 100000 <= ultimate_cost_prediction < 150000
        - >150K: ultimate_cost_prediction >= 150000
        
        MATHEMATICAL VALIDATION REQUIRED:
        Before selecting category, verify prediction falls within range
    feature_importance:
      # Derived from same sources as ultimate_cost_prediction
      settlement_adjuster_notes.settlement_amount: 1.0
      settlement_adjuster_notes.total_incurred_cost: 0.95
      medical_provider_letter.total_medical_cost: 0.85
      adjuster_notes_initial.initial_reserve_amount: 0.5
    validation:
      min_confidence: 0.7
      rationale_required: true
    examples:
      - scenario: "Correct categorization - $65K claim"
        stage1_data:
          ultimate_cost_prediction: 65000
          settlement_amount: 65000
        correct_output: "50K-100K"
        rationale: "Ultimate cost prediction of $65,000 falls in the 50K-100K range ($50,000 <= $65,000 < $100,000)"
        wrong_output: ">150K"
        why_wrong: "$65,000 is NOT greater than $150,000. This is mathematically impossible and contradicts the prediction."
      - scenario: "Correct categorization - $180K claim"
        stage1_data:
          ultimate_cost_prediction: 180000
        correct_output: ">150K"
        rationale: "Ultimate cost prediction of $180,000 exceeds $150,000 threshold"
      - scenario: "Edge case - exactly $50K"
        stage1_data:
          ultimate_cost_prediction: 50000
        correct_output: "50K-100K"
        rationale: "$50,000 falls in 50K-100K range (inclusive lower bound)"
    decision_matrix:
      validation_checklist:
        - "Extract ultimate_cost_prediction value"
        - "Verify value is a number"
        - "Apply strict mathematical comparison"
        - "Select category where value falls within range"
        - "Double-check: does prediction fall in selected category range?"
    critical_validation: |
      BEFORE FINALIZING, VERIFY:
      ✓ Does prediction fall within category range?
      ✓ Example: $65K is in 50K-100K range → Category MUST be '50K-100K'
      ✓ Example: $65K is NOT in >150K range → Category CANNOT be '>150K'
      
      MATHEMATICAL CHECK:
      If prediction = P and category = C, then:
      - C = "<25K" requires P < 25000
      - C = "25K-50K" requires 25000 <= P < 50000
      - C = "50K-100K" requires 50000 <= P < 100000
      - C = "100K-150K" requires 100000 <= P < 150000
      - C = ">150K" requires P >= 150000
    consistency_checks:
      - check: "ultimate_cost_category matches ultimate_cost_prediction range"
        message: "Category must align with prediction value"
    related_variables: ["ultimate_cost_prediction"]

  treatment_type:
    category: "RESERVING"
    description: "Primary treatment approach for the injury"
    data_type: "string"
    enum: ["conservative", "surgical", "ongoing_chronic", "complex_rehab"]
    validation:
      min_confidence: 0.7
      rationale_required: true
    related_variables: ["medical_complexity", "injury_severity"]

  time_to_closure_days:
    category: "CLAIM_MANAGEMENT"
    description: "Estimated or actual number of days from incident to claim closure"
    data_type: "number"
    unit: "days"
    feature_importance:
      # Settlement - ACTUAL closure time
      settlement_adjuster_notes.time_to_closure_days: 1.0
      settlement_adjuster_notes.claim_development_speed: 0.93
      settlement_adjuster_notes.resolution_timeline_estimate: 0.88

      # Medical provider - Recovery timeline prediction
      medical_provider_letter.maximum_medical_improvement: 0.85
      medical_provider_letter.expected_recovery_time: 0.83
      medical_provider_letter.rtw_timeline_prediction: 0.80

      # Clinical notes - Treatment duration
      clinical_note.expected_recovery_time: 0.75
      clinical_note.ongoing_care_needs: 0.72

      # Settlement - Closure likelihood
      settlement_adjuster_notes.closure_likelihood: 0.70
      settlement_adjuster_notes.rtw_success: 0.68

      # Initial adjuster - Early timeline estimates
      adjuster_notes_initial.rtw_timeline_estimate: 0.55

      # Phone transcript - Initial work absence estimate
      phone_transcript.work_absence_expected: 0.40

      # Claimant statement - Recovery attitude impact
      claimant_statement.recovery_attitude: 0.35
      claimant_statement.claimant_motivation_level: 0.33
    aggregation_rules:
      priority_logic: |
        1. If settlement time_to_closure_days exists → RETURN actual value (weight 1.0)
        2. If claim closed → Calculate days from incident_date to settlement_date
        3. Otherwise → Convert medical provider MMI timeline to days
        4. Adjust based on claim_development_speed and cooperation factors
        
        Estimation guide:
        - fast_close: 90-180 days
        - average: 180-365 days  
        - slow: 365-730 days
        - long_tail: >730 days

        CRITICAL: Actual closure time from settlement is DEFINITIVE
    validation:
      min_value: 0
      max_value: 3650  # 10 years maximum
      min_confidence: 0.6
      rationale_required: true
    related_variables: ["expected_development_pattern", "management_complexity"]

  fraud_risk:
    category: "CLAIM_MANAGEMENT"
    description: "Assessed risk of fraudulent claim elements"
    data_type: "string"
    valid_values: ["low", "medium", "high"]
    feature_importance:
      # Claimant statement - Direct fraud indicators
      claimant_statement.malingering_risk: 0.88
      claimant_statement.exaggeration_indicators: 0.86
      claimant_statement.coaching_evidence: 0.84
      claimant_statement.story_consistency_score: 0.82
      claimant_statement.narrative_consistency: 0.80
      claimant_statement.fact_verification: 0.78
      claimant_statement.discrepancy_identification: 0.76

      # Phone transcript - Early red flags
      phone_transcript.narrative_consistency: 0.65
      phone_transcript.credibility_assessment: 0.63
      phone_transcript.red_flags: 0.60
      phone_transcript.immediate_reporting: 0.58

      # Initial adjuster - Investigation findings
      adjuster_notes_initial.red_flags: 0.70
      adjuster_notes_initial.witness_cooperation: 0.65
      adjuster_notes_initial.investigation_complexity: 0.63

      # Clinical notes - Medical consistency
      clinical_note.patient_compliance: 0.55
      clinical_note.red_flags_medical: 0.53
      clinical_note.improvement_noted: 0.50

      # Medical provider - Treatment appropriateness
      medical_provider_letter.treatment_appropriateness: 0.60
      medical_provider_letter.patient_compliance: 0.58
    aggregation_rules:
      priority_logic: |
        1. If claimant_statement malingering_risk exists → Use as primary (weight 0.88)
        2. Aggregate with phone transcript red_flags (weight 0.60-0.65)
        3. Validate with adjuster investigation findings (weight 0.63-0.70)
        4. Cross-check with clinical compliance and medical appropriateness
        
        CRITICAL: Weight adjuster investigation findings heavily
        CRITICAL: Consider credibility assessments from multiple sources
        CRITICAL: Use highest risk level if conflicting assessments with supporting evidence
        CRITICAL: Multiple fraud indicators compound risk assessment
        Factors_to_consider:
        "credibility_assessment from multiple documents"
        "story_consistency across encounters"
        "medical_treatment alignment with reported injury"
        "reporting_timing and delay patterns"
        "surveillance findings if any"
        "inconsistent statements or exaggerations"
    validation:
      min_confidence: 0.6
      rationale_required: true
    examples:
      - scenario: "Low fraud risk"
        stage1_data:
          credibility: "high"
          story_consistency: "excellent across all documents"
          witness_corroboration: "yes"
          medical_alignment: "injury matches accident description"
          reporting_timing: "immediate"
        output: "low"
        rationale: "High credibility with consistent story across all documents, witness corroboration, immediate reporting, and medical findings aligned with accident description indicate low fraud risk"
      - scenario: "High fraud risk with red flags"
        stage1_data:
          credibility: "low"
          inconsistencies: ["injury description changed", "timeline conflicts"]
          medical_alignment: "treatment excessive for reported injury"
          reporting_delay: "2 weeks"
          surveillance: "activity inconsistent with claimed disability"
        output: "high"
        rationale: "Multiple red flags including inconsistent injury descriptions, excessive treatment, delayed reporting, and surveillance showing activities inconsistent with claimed disability indicate high fraud risk"
      - scenario: "Medium risk with minor concerns"
        stage1_data:
          credibility: "medium"
          minor_inconsistencies: ["date uncertainty"]
          medical_alignment: "generally appropriate"
        output: "medium"
        rationale: "Minor inconsistencies in dates but generally credible story and appropriate medical treatment indicate medium fraud risk"
      - scenario: "Medium fraud risk"
        stage1_data:
          credibility_assessment: "medium"
          inconsistencies: [ "timeline discrepancies" ]
        output: "medium"
        rationale: "Minor inconsistencies in timeline raise moderate fraud concerns"
    related_variables: ["credibility_assessment", "risk_level", "management_complexity"]

  return_to_work_status:
    category: "CLAIM_MANAGEMENT"
    description: "Claimant's current or projected return to work status"
    data_type: "string"
    enum: ["returned_full_duty", "returned_light_duty", "not_returned", "permanent_disability", "unknown"]

    validation:
      min_confidence: 0.6
      rationale_required: true

    related_variables: ["injury_severity", "medical_complexity", "time_to_closure_days"]

  total_medical_costs:
    category: "RESERVING"
    description: "Total medical costs incurred (subset of total_incurred_cost)"
    data_type: "number"
    unit: "USD"

    validation:
      min_value: 0
      max_value: 10000000
      min_confidence: 0.7
      rationale_required: true

    related_variables: ["total_incurred_cost", "medical_complexity"]

  total_indemnity_paid:
    category: "RESERVING"
    description: "Total indemnity/wage loss payments made"
    data_type: "number"
    unit: "USD"

    validation:
      min_value: 0
      max_value: 10000000
      min_confidence: 0.7
      rationale_required: true

    related_variables: ["total_incurred_cost", "return_to_work_status"]

  settlement_amount:
    category: "RESERVING"
    description: "Final settlement amount agreed upon (if claim settled)"
    data_type: "number"
    unit: "USD"

    aggregation_rules:
      priority_logic: |
        CRITICAL: Settlement amount IS the ultimate cost
        Do NOT add additional costs beyond settlement
        Only exists if claim is closed_settled or pending_settlement

    validation:
      min_value: 0
      max_value: 10000000
      min_confidence: 0.9
      rationale_required: true

    related_variables: ["ultimate_cost_prediction", "total_incurred_cost"]

  claim_closure_status:
    category: "CLAIM_MANAGEMENT"
    description: "Current status of claim (open, closed, settled, denied)"
    data_type: "string"
    enum: ["open_active", "open_inactive", "closed_settled", "closed_denied", "pending_settlement"]

    validation:
      min_confidence: 0.8
      rationale_required: true

    related_variables: ["settlement_amount", "time_to_closure_days", "settlement_likelihood"]

  # Additional RESERVING variables (basic structure only)
  permanent_disability_rating:
    category: "RESERVING"
    description: "Permanent partial or total disability rating if assessed"
    data_type: "number"
    unit: "percentage"
    validation:
      min_value: 0
      max_value: 100
      min_confidence: 0.7
      rationale_required: true
    related_variables: ["injury_severity", "return_to_work_status"]

  recovery_timeline_days:
    category: "RESERVING"
    description: "Estimated or actual recovery period in days"
    data_type: "number"
    unit: "days"
    validation:
      min_value: 0
      max_value: 3650
      min_confidence: 0.6
      rationale_required: true
    related_variables: ["injury_severity", "medical_complexity", "return_to_work_status"]

  maximum_medical_improvement_reached:
    category: "RESERVING"
    description: "Whether claimant has reached maximum medical improvement"
    data_type: "boolean"
    validation:
      min_confidence: 0.7
      rationale_required: true
    related_variables: ["recovery_timeline_days", "claim_closure_status"]

  # Additional RATEMAKING variables
  employer_size_category:
    category: "RATEMAKING"
    description: "Size classification of employer for experience rating"
    data_type: "string"
    enum: ["small", "medium", "large", "enterprise"]
    validation:
      min_confidence: 0.6
      rationale_required: false
    related_variables: ["experience_modifier_impact", "industry_risk_category"]

  claim_frequency_indicator:
    category: "RATEMAKING"
    description: "Indicator of whether this is a repeat claimant or high-frequency employer"
    data_type: "string"
    enum: ["first_claim", "repeat_claimant", "high_frequency_employer", "unknown"]
    validation:
      min_confidence: 0.5
      rationale_required: true
    related_variables: ["experience_modifier_impact", "fraud_risk"]

  # Additional CLAIM_MANAGEMENT variables
  subrogation_potential:
    category: "CLAIM_MANAGEMENT"
    description: "Potential for subrogation recovery from third parties"
    data_type: "string"
    enum: ["none", "low", "medium", "high"]
    validation:
      min_confidence: 0.6
      rationale_required: true
    related_variables: ["causation_type", "ultimate_cost_prediction"]

  claimant_cooperation_level:
    category: "CLAIM_MANAGEMENT"
    description: "Level of claimant cooperation throughout claim process"
    data_type: "string"
    enum: ["excellent", "good", "fair", "poor", "adversarial"]
    validation:
      min_confidence: 0.7
      rationale_required: true
    related_variables: ["management_complexity", "litigation_risk", "fraud_risk"]

  reserve_adequacy:
    category: "RESERVING"
    description: "Assessment of whether reserves are adequate for expected costs"
    data_type: "string"
    enum: ["adequate", "possibly_deficient", "deficient", "excessive"]
    validation:
      min_confidence: 0.6
      rationale_required: true
    related_variables: ["recommended_reserve", "ultimate_cost_prediction", "total_incurred_cost"]

  medical_provider_quality:
    category: "RESERVING"
    description: "Quality and appropriateness of medical care provided"
    data_type: "string"
    enum: ["appropriate", "questionable", "excessive", "inadequate"]
    validation:
      min_confidence: 0.6
      rationale_required: true
    related_variables: ["medical_complexity", "total_medical_costs", "treatment_type"]

# =============================================================================
# CROSS-VARIABLE VALIDATION RULES
# =============================================================================
cross_variable_validation:
  financial_consistency:
    - rule: "total_incurred_cost <= ultimate_cost_prediction"
      severity: "error"
      action: "flag"
      description: "Incurred costs cannot exceed ultimate prediction"
    - rule: "ultimate_cost_prediction >= total_incurred_cost"
      severity: "error"
      action: "flag"
      description: "Ultimate_cost_prediction >= total_incurred_cost"
    - rule: "estimated_outstanding_cost = ultimate_cost_prediction - total_incurred_cost"
      severity: "warning"
      action: "flag"
      description: "Outstanding should equal ultimate minus incurred"

    - rule: "settlement_amount = ultimate_cost_prediction (when claim settled)"
      severity: "critical"
      action: "flag"
      description: "Settlement IS the ultimate cost for closed claims"

    - rule: "total_incurred_cost = total_medical_costs + total_indemnity_paid + administrative_costs"
      severity: "error"
      action: "flag"
      description: "Incurred must equal sum of components"

  category_consistency:
    - rule: "ultimate_cost_category must match ultimate_cost_prediction range"
      severity: "critical"
      action: "flag"
      description: "MATHEMATICAL CHECK: If prediction = $65K, category MUST be '50K-100K'"

    - rule: "injury_severity should align with ultimate_cost_category"
      severity: "warning"
      action: "flag"
      description: "Catastrophic injuries typically result in >150K costs"

  logical_consistency:
    - rule: "If surgery_required=true, then medical_complexity >= 'moderate'"
      severity: "warning"
      action: "flag"
      description: "If surgery_required=true, then medical_complexity >= 'moderate'"

    - rule: "If litigation_risk = 'high' then settlement_likelihood should be 'low' or 'medium'"
      severity: "warning"
      action: "flag"
      description: "High litigation risk typically reduces settlement likelihood"

    - rule: "If medical_complexity >= 'complex' then management_complexity >= 'moderate'"
      severity: "warning"
      action: "flag"
      description: "Complex medical cases require moderate+ management effort"

    - rule: "If claim_closure_status = 'closed_settled' then settlement_amount must exist"
      severity: "error"
      action: "flag"
      description: "Settled claims must have settlement amount"

    - rule: "If return_to_work_status = 'permanent_disability' then injury_severity >= 'major'"
      severity: "warning"
      action: "flag"
      description: "Permanent disability indicates major or catastrophic injury"

  temporal_consistency:
    - rule: "date_of_loss must be before processing_timestamp"
      severity: "error"
      action: "flag"
      description: "Date_of_loss must be before processing_timestamp"
    - rule: "time_to_closure_days should be positive if claim closed"
      severity: "warning"
      action: "flag"
      description: "Closed claims should have positive time to closure"

# =============================================================================
# END OF STAGE 2 VARIABLE DEFINITIONS
# =============================================================================