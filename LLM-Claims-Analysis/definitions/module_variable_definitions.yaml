      - coverage_issues
      - investigation_complexity

      # Claim complexity factors
      - investigation_actions_required
      - witness_cooperation
      - employer_cooperation
      - legal_involvement_potential

    secondary_variables:
      # Cost drivers (enrichment)
      - treating_physician_specialty
      - diagnostic_tests_ordered
      - treatment_protocol
      - rtw_timeline_estimate

      # Additional investigation factors
      - investigation_required
      - investigation_status
      - subrogation_potential
      - third_party_involvement
      - legal_representation

      # Risk indicators
      - red_flags
      - recommended_actions
      - policy_limits

  medical_provider_letter:
