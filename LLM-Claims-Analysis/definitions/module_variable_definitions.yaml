      - alternative_treatments
      - patient_compliance
      - recovery_prognosis

  settlement_adjuster_notes:
    primary_variables:
      # Core settlement identification
      - settlement_amount
      - settlement_date
      - settlement_type
      - claim_closure_status
      - time_to_closure_days

      # Actual costs (critical for validation)
      - total_medical_costs
      - total_wage_loss
      - administrative_costs
