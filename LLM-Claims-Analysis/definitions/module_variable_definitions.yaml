# =============================================================================
# Version: 2.0
# Last Updated: 2025-10-29
# Created by: Claims Analysis Team
#
# MAJOR CHANGES FROM v1.0:
# - REMOVED: `tier` field (internal prompt optimization detail)
# - ADDED: `category` field (actuarial function: RESERVING, RATEMAKING, CLAIM_MANAGEMENT)
# - ORGANIZED: Variables grouped by actuarial function category
# - REMOVED: Aggregated variables (litigation_risk_aggregated, fraud_risk_aggregated)
# - IMPLEMENTED: Complete feature_importance for 15 CORE variables
# - LISTED: Additional variables for future implementation
#
# ARCHITECTURE:
# Stage 1 (Document Extraction) → Stage 2 (Actuarial Analysis) → DONE
# NO Stage 3, NO meta-aggregation, NO "_aggregated" suffixes
# =============================================================================

metadata:
  version: "2.0"
  last_updated: "2025-10-29"
  created_by: "Claims Analysis Team"

  variable_counts:
    total_stage1_variables: 62
    total_stage2_variables: 33
    core_variables: 15          # With complete feature_importance
    additional_variables: 18    # Basic structure only, for future implementation

  actuarial_categories:
    - RESERVING: "Reserve setting, cost prediction, loss development"
    - RATEMAKING: "Pricing, risk classification, experience rating"
    - CLAIM_MANAGEMENT: "Claim handling strategy, operational decisions"

  changelog:
    - version: "2.0"
      date: "2025-10-29"
      changes: "Removed tier field, added category field, organized by actuarial function, removed aggregated variables, completed feature_importance for 15 CORE variables"
      author: "Claims Analysis Team"
    - version: "1.0"
      date: "2025-10-11"
      changes: "Initial comprehensive variable definitions with tiered detail levels"
      author: "Claims Analysis Team"


