      # Core identification
      - primary_diagnosis
      - body_parts_affected

      # Medical severity assessment
      - specific_diagnosis
      - treatment_complexity
      - diagnostic_certainty
      - complication_risk

      # Cost predictions
      - treatment_duration_estimates
      - specialist_care_requirements
      - therapy_rehabilitation_needs
      - future_medical_necessity

      # Disability assessment
      - work_restrictions_severity
      - rtw_timeline_prediction
      - permanent_impairment_likelihood
      - maximum_medical_improvement

      # Medical necessity
      - treatment_appropriateness
      - standard_of_care_compliance

