# Claims Analysis Configuration - Script 4
# File: config/4_analysis-analyze_claims.yaml

#
# This configuration file controls all aspects of the enhanced LLM claims
# analysis pipeline with modern infrastructure integration.

# LOGGING CONFIGURATION

logging:
  level: DEBUG  # DEBUG, INFO, WARNING, ERROR

  # Console output format
  console_format: "%(asctime)s %(levelname)-5s : %(message)s"

  # File logging format (if enabled)
  file_format: "%(asctime)s - %(name)s %(levelname)-5s : %(message)s"
  file_logging: false  # Set to true to enable file logging

  # Debug mode controls (only active when level=DEBUG)
  debug_options:
    show_api_prompts: true           # Show full prompts sent to API
    show_api_responses: true         # Show full API responses
    show_stage1_details: true        # Show Stage 1 processing details
    show_stage2_details: true        # Show Stage 2 aggregation details
    show_variable_definitions: true  # Show full variable definitions in prompts
    max_prompt_chars: 2000           # Limit prompt display length
    max_response_chars: 1500         # Limit response display length


# API SETTINGS

api_settings:
  # Provider selection: "openai" or "ollama"
  provider: "openai"  # Change to "ollama" for local LLM

  # Default model settings
  default_max_tokens: 2000

  # Retry settings (3x retry with exponential backoff)
  retry_count: 1
  retry_delay_base: 2  # Base delay in seconds (2^attempt)

  # OpenAI-specific settings
  openai:
    models:
      stage1: "gpt-4o-mini-2024-07-18"
      stage2: "gpt-4o-mini-2024-07-18"
      default: "gpt-4o-mini-2024-07-18"

    pricing:
      gpt_4o_mini_input_cost_per_1k: 0.00015
      gpt_4o_mini_output_cost_per_1k: 0.0006

  # Ollama-specific settings
  ollama:
    base_url: "http://localhost:11434/v1"

    models:
      stage1: "qwen2.5:7b"          # Excellent for structured extraction
      stage2: "qwen2.5:7b"          # Consistent aggregation
      default: "qwen2.5:7b"

      # Alternative options:
      # Quality-focused: "qwen2.5:14b" or "mistral:7b"
      # Speed-focused: "phi3:mini"


# PROCESSING SETTINGS

processing:
  # Default directories (can be overridden by CLI arguments)
  default_input_dir: "output/2_data-add_documents"  # Can take from Script 2 or 3
  default_output_dir: "output/4_analysis-analyze_claims"

  # Stage enablement
  stage1_enabled: true
  stage2_enabled: true


# STAGE 1: DOCUMENT-SPECIFIC FEATURE EXTRACTION

stage1_settings:
  # Enable function calling for structured output + rich text
  use_function_calling: true

  # Template organization flags
  use_category_templates: true      # Use category/template_*.py
  use_specialized_templates: true   # Use specialized/template_*.py

  # Model settings (can override api_settings defaults)
  max_tokens: 2000
  temperature: 0.3


# STAGE 2: AGGREGATION INTO FINAL ACTUARIAL VARIABLES

stage2_settings:
  # Enable function calling for final analysis
  use_function_calling: true

  # Templates
  use_orchestrator: true
  orchestrator_file: "universal/orchestrator.py"
  function_schema_file: "stage2_aggregation.json"

  # Model settings
  max_tokens: 10000 # Max 16384 for GPT-4o-mini
  temperature: 0.1  # Low temperature for consistent aggregation

# SHARED SETTINGS (Used by both Stage 1 and Stage 2)

shared_settings:
  # Templates directory (used by both stages)
  templates_dir: "templates"

  # Rationale system configuration
  # This system applies to both stages but with stage-specific behavior:
  # - Stage 1: Rationale explains extraction from a single document
  # - Stage 2: Rationale explains aggregation across multiple documents
  rationale_system:
    enabled: true
    mode: "full"  # Options: "full", "selective", "disabled"

    # Selective fields (only used when mode="selective")
    # These are the high-value fields that get full rationale treatment
    # Stage 1: Applied to document-specific extractions
    # Stage 2: Applied to final aggregated actuarial variables
    selective_fields:
      # Medical fields
      - "total_medical_cost"
      - "surgery_required"
      - "disability_rating"
      - "estimated_recovery_timeline_days"

      # Financial fields
      - "settlement_amount"
      - "total_incurred_cost"
      - "initial_reserve_amount"
      - "total_medical_costs"
      - "ultimate_cost_prediction"

      # Severity fields
      - "claim_severity"
      - "injury_severity"
      - "injury_severity_initial"

      # Risk fields
      - "litigation_risk"
      - "credibility_assessment"

      # Recovery fields
      - "estimated_recovery_days"
      - "estimated_time_off_work_days"


# DOCUMENT TYPES CONFIGURATION

document_types:
  # Phone transcripts - high priority for initial assessment
  phone_transcript:
    max_tokens: 1500
    temperature: 0.3
    priority: 3
    weight: 0.7
    specialized_template: "template_phone_transcript.py"
    function_schema_file: "stage1_phone_transcript.json"

  # Medical provider letters - highest priority for medical assessment
  medical_provider_letter:
    max_tokens: 2000
    temperature: 0.2
    priority: 1
    weight: 1.0
    specialized_template: "template_medical_provider.py"
    function_schema_file: "stage1_medical_provider.json"

  # Initial adjuster notes - high priority for claim setup
  adjuster_notes_initial:
    max_tokens: 1800
    temperature: 0.3
    priority: 2
    weight: 0.7
    specialized_template: "template_adjuster_notes.py"
    function_schema_file: "stage1_adjuster_notes.json"

  # Settlement adjuster notes - medium priority
  settlement_adjuster_notes:
    max_tokens: 1800
    temperature: 0.3
    priority: 1
    weight: 0.9
    specialized_template: "template_settlement_notes.py"
    function_schema_file: "stage1_settlement_notes.json"

  # Claimant statements - lower priority
  claimant_statement:
    max_tokens: 1500
    temperature: 0.4
    priority: 3
    weight: 0.6
    specialized_template: "template_claimant_statement.py"
    function_schema_file: "stage1_claimant_statement.json"

  # Clinical notes - medium priority
  clinical_note:
    max_tokens: 2000
    temperature: 0.2
    priority: 2
    weight: 0.85
    specialized_template: "template_clinical_note.py"
    function_schema_file: "stage1_clinical_note.json"


# CLOUD STORAGE (OPTIONAL)

cloud_storage:
  enabled: false  # Set to true to enable Google Cloud Storage

  # GCS Configuration
  project_id: "your-project-id"
  bucket_name: "your-bucket-name"
  credentials_path: null  # Optional: path to service account JSON

  # Cloud paths (within bucket)
  stage1_output_path: "analysis/stage1/"
  stage2_output_path: "analysis/stage2/"

  # Performance settings
  upload_batch_size: 10
  download_parallel: true


# OUTPUT STRUCTURE - Preserving existing organization

output_structure:
  feature_extraction: "stage1_features"     # Stage 1 output folder
  final_analysis: "stage2_final_analysis"   # Stage 2 output folder
  reports: "reports"                        # Reports folder
  temp: "temp"                              # Temporary files


# FILENAME TEMPLATES - Preserving existing naming conventions

filename_templates:
  # Stage 1 outputs
  feature_extraction: "stage1_{patient_initials}_{claim_id}_features.json"

  # Stage 2 outputs
  final_analysis: "stage2_{patient_initials}_{claim_id}_final_analysis.json"

  # Report files
  stage1_report: "stage1_report_{timestamp}.json"
  stage2_report: "stage2_report_{timestamp}.json"
  pipeline_report: "pipeline_report_{timestamp}.json"

  # Processing logs
  processing_log: "processing_{timestamp}.log"
  error_log: "errors_{timestamp}.log"


# QUALITY CONTROL

quality_control:
  # Enable/disable confidence flagging
  flag_low_confidence: true          # Flag low confidence results
  flag_conflicts: true               # Flag detected conflicts
  flag_missing_documents: true       # Flag when key documents missing

  # Category-level confidence thresholds (for overall, reserving, ratemaking, claim_management)
  category_confidence_low: 0.6       # <= 0.6 triggers LOW flag
  category_confidence_medium: 0.7    # > 0.6 and <= 0.7 triggers MEDIUM flag

  # Variable-level confidence thresholds (for individual actuarial variables)
  variable_confidence_low: 0.5       # <= 0.5 triggers LOW flag
  variable_confidence_medium: 0.7    # > 0.5 and <= 0.7 triggers MEDIUM flag

  # Legacy thresholds (kept for backward compatibility, not actively used)
  min_stage1_confidence: 0.5         # Minimum confidence for Stage 1 features
  min_stage2_confidence: 0.6         # Minimum confidence for Stage 2 analysis


  # Required document types for complete analysis
  required_documents:
    - "medical_provider_letter"

  # Recommended document types
  recommended_documents:
    - "phone_transcript"
    - "adjuster_notes_initial"


# EXTRACTION TEMPLATES (for future customization)

extraction_templates:
  phone_transcript:
    extract_categories:
      - "severity_indicators"
      - "risk_factors"
      - "cost_predictors"
      - "claim_characteristics"

  adjuster_notes_initial:
    extract_categories:
      - "liability_coverage"
      - "reserve_setting"
      - "claim_complexity"
      - "cost_drivers"

  medical_provider_letter:
    extract_categories:
      - "medical_severity"
      - "cost_predictions"
      - "disability_assessment"
      - "medical_necessity"
      - "risk_stratification"

  settlement_adjuster_notes:
    extract_categories:
      - "actual_costs"
      - "settlement_analysis"
      - "outcome_predictors"
      - "pattern_indicators"

  claimant_statement:
    extract_categories:
      - "credibility_assessment"
      - "soft_risk_factors"
      - "fraud_indicators"
      - "validation_data"

  clinical_note:
    extract_categories:
      - "medical_assessment"
      - "prognosis_factors"
      - "cost_factors"


# VALIDATION RULES

validation:
  # Output validation (toggleable)
  validate_stage1_schema: true        # Stage 1 extraction structure validation
  validate_stage2_schema: true        # Stage 2 schema and consistency validation

  # Rationale validation (toggleable when rationale system enabled)
  validate_rationale_presence: false  # Validate rationale fields are present
  require_source_citations: false     # Validate source_documents field is present


# TEMPORAL WEIGHTING CONFIGURATION
temporal_weighting:
  enabled: true
  decay_function: "stepped"

  stepped_decay:
    thresholds:
      - days: 30
        factor: 1.0
      - days: 90
        factor: 0.9
      - days: 180
        factor: 0.8
      - days: 365
        factor: 0.7
      - days: 999999
        factor: 0.6

  missing_date_strategy: "conservative"
  missing_date_factor: 0.7

  document_overrides:
    settlement_adjuster_notes:
      decay_function: "none"
      fixed_factor: 1.0


# COMPOUND SCORING CONFIGURATION
compound_scoring:
  enabled: true
  use_document_weight: true
  use_confidence_score: true
  use_recency_factor: true
  use_feature_importance: true

  missing_confidence_default: 0.5
  missing_recency_default: 0.7
  missing_importance_default: 0.5

  minimum_compound_score: 0.15
  low_score_threshold: 0.4

  include_scores_in_prompt: true
  score_presentation: "detailed"