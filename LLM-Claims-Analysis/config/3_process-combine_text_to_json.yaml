# Text File Processor Configuration
# Converts text files to unified JSON format for claims analysis pipeline
# Location: ./config/3_process-combine_text_to_json.yaml

# PROCESSING SETTINGS

processing:
  # Default directories
  input_folder: "input/text_data"
  default_output_dir: "./output/3_process-combine_text_to_json"

  # File processing settings
  encoding: "utf-8"
  min_content_length: 50  # Minimum characters required per file


# LOGGING CONFIGURATION

logging:
  level: INFO                    # DEBUG, INFO, WARNING, ERROR
  console_format: "%(asctime)s %(levelname)-5s : %(message)s"
  file_format: "%(asctime)s %(name)s %(levelname)-5s : %(message)s"
  file_logging: false

  # Debug mode controls (only active when level=DEBUG or --verbose)
  debug_options:
    show_file_processing: true     # Show file loading and parsing details
    show_json_creation: true       # Show JSON creation and grouping steps
    show_encounter_details: true   # Show encounter hierarchy and content
    max_content_preview: 200       # Limit content display length (0 = no limit)


# TEXT FILE PROCESSING CONFIGURATION

text_file_processing:
  # Expected filename pattern for documentation
  filename_pattern: "claim_id_patient_initials_document_type.txt"
  encoding: "utf-8"
  min_content_length: 50  # Minimum characters required


# DOCUMENT TYPE MAPPING

# Maps filename components to standardized document types
document_type_mapping:
  # Phone transcripts
  phone: "phone_transcript"
  transcript: "phone_transcript"
  phone_transcript: "phone_transcript"

  # Adjuster notes
  adjuster: "adjuster_notes_initial"
  adjuster_initial: "adjuster_notes_initial"
  adjuster_notes_initial: "adjuster_notes_initial"

  # Medical provider documents
  medical: "medical_provider_letter"
  provider: "medical_provider_letter"
  medical_provider_letter: "medical_provider_letter"

  # Settlement notes
  settlement: "settlement_adjuster_notes"
  settlement_adjuster_notes: "settlement_adjuster_notes"

  # Claimant statements
  claimant: "claimant_statement"
  statement: "claimant_statement"
  claimant_statement: "claimant_statement"

  # Clinical notes
  clinical: "clinical_note"
  note: "clinical_note"
  clinical_note: "clinical_note"


# OUTPUT FILENAME TEMPLATES

filename_templates:
  # Template for JSON output files
  json_conversion: "claims_{claim_id}_{patient_initials}.json"


# QUALITY CONTROL

quality_control:
  merge_duplicate_document_types: true    # Merge multiple files of same type


# ERROR HANDLING

error_handling:
  save_partial_results: true             # Save results even if some files fail