# Synthetic Document Generator Configuration
# Location: ./config/2_data-add_documents.yaml


# API SETTINGS

api_settings:
  # Provider selection: "openai" or "ollama"
  provider: "openai" # Change to "ollama" for local LLM

  # Token limits
  master_profile_max_tokens: 2000
  document_max_tokens: 1500
  default_max_tokens: 1500

  # Retry settings
  retry_count: 3
  retry_delay_base: 2

  # OpenAI-specific settings
  openai:
    models:
      master_profile: "gpt-4o-mini-2024-07-18"
      document: "gpt-4o-mini-2024-07-18"
      default: "gpt-4o-mini-2024-07-18"

    # Retry settings for validation failures
    max_retries: 1  # OpenAI models are generally reliable with structured output

  # Pricing for cost tracking (USD per 1K tokens)
  pricing:
    gpt_4o_mini_input_cost_per_1k: 0.00015
    gpt_4o_mini_output_cost_per_1k: 0.0006

  # Ollama-specific settings
  ollama:
    base_url: "http://localhost:11434/v1"  # Ollama API endpoint

    # Retry settings for validation failures
    max_retries: 2  # Local models may need extra attempts for complex structured output

    models:
      master_profile: "qwen2.5:7b"    # Recommended: superior function calling and structured output
      document: "qwen2.5:7b"          # Excellent for coherent document generation
      default: "qwen2.5:7b"           # Best for structured generation tasks

      # Alternative options:
      # Quality-focused: "qwen2.5:14b" or "qwen2.5:32b"
      # Budget/Speed-focused: "llama3.2:3b"
      # Note: Qwen 2.5 models have superior function calling capabilities,
      # which is critical for Script 2's structured document generation

# PROCESSING SETTINGS

processing:
  # Default directories
  default_input_dir: "output/1_data-process_fhir_bundle"
  default_output_dir: "output/2_data-add_documents"
  
  # Processing limits
  max_concurrent_files: 1


# DOCUMENT GENERATION SETTINGS

document_generation:
  # Master profile settings
  master_profile:
    max_tokens: 3000
    temperature: 0.8  # Increased for more variety in case scenarios
    min_content_length: 500

  # Individual document settings
  documents:
    phone_transcript:
      max_tokens: 1500
      temperature: 0.9  # High temperature for natural conversation with disfluencies
      min_content_length: 500
    
    adjuster_notes_initial:
      max_tokens: 1200
      temperature: 0.7  # Increased for more natural note-taking style
      min_content_length: 400
    
    medical_provider_letter:
      max_tokens: 1000
      temperature: 0.5  # Keep moderate for professional medical content
      min_content_length: 300
    
    settlement_adjuster_notes:
      max_tokens: 1300
      temperature: 0.7  # Increased for more natural financial analysis
      min_content_length: 400
    
    claimant_statement:
      max_tokens: 1000
      temperature: 1.0  # Maximum temperature for emotional, authentic first-person narrative
      min_content_length: 300


# VALIDATION SETTINGS

validation:
  # Document validation
  document_min_lengths:
    phone_transcript: 500
    adjuster_notes_initial: 400
    medical_provider_letter: 300
    settlement_adjuster_notes: 400
    claimant_statement: 300
  
  # Required elements by document type
  required_elements:
    phone_transcript: ["claimant", "claim"]
    adjuster_notes_initial: ["claim", "claimant"]
    medical_provider_letter: ["patient", "treatment"]
    settlement_adjuster_notes: ["settlement", "claim"]
    claimant_statement: ["claimant", "work"]


# LOGGING CONFIGURATION

logging:
  level: DEBUG                    # DEBUG, INFO, WARNING, ERROR
  console_format: "%(asctime)s %(levelname)-5s : %(message)s"
  file_format: "%(asctime)s %(name)s %(levelname)-5s : %(message)s"
  file_logging: true
  
  # Debug mode controls (only active when level=DEBUG)
  debug_options:
    show_api_prompts: true       # Show full prompts sent to API
    show_api_responses: true     # Show full API responses
    show_generation_details: true # Show detailed generation information
    max_prompt_chars: 3000       # Limit prompt display length (0 = no limit)
    max_response_chars: 3000     # Limit response display length (0 = no limit)